<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<meta name="theme-color" content="#0D0D0D"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>Powerhouse — 12-Week Training</title>
<script src="https://cdn.jsdelivr.net/npm/@ericblade/quagga2@1.8.4/dist/quagga.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0D0D0D;--card:#111;--card-hover:#1a1a1a;--border:#222;
  --text:#fff;--text2:#999;--text3:#555;
  --red:#E74C3C;--orange:#E67E22;--green:#27AE60;--blue:#3B82F6;
  --purple:#9B59B6;
  --radius:14px;
}
html,body{height:100%;background:var(--bg);color:var(--text);
  font-family:'SF Mono','JetBrains Mono','Fira Code','Consolas',monospace;
  -webkit-font-smoothing:antialiased;overflow:hidden}
body{display:flex;justify-content:center}
.app{width:100%;max-width:480px;height:100%;display:flex;flex-direction:column;position:relative}

/* Header */
header{padding:16px 20px 12px;display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--border);flex-shrink:0}
header h1{font-size:15px;letter-spacing:3px;font-weight:700}
header button{background:none;border:none;color:var(--text2);font-size:20px;cursor:pointer;padding:4px}
header button:hover{color:var(--text)}

/* Content */
.content{flex:1;overflow-y:auto;padding:16px 16px 24px;-webkit-overflow-scrolling:touch}
.content::-webkit-scrollbar{width:0}

/* Bottom Nav */
nav{display:flex;border-top:1px solid var(--border);flex-shrink:0;background:var(--bg)}
nav button{flex:1;padding:12px 0 14px;background:none;border:none;color:var(--text3);
  font-family:inherit;font-size:10px;cursor:pointer;display:flex;flex-direction:column;
  align-items:center;gap:4px;transition:color .2s}
nav button.active{color:var(--text)}
nav button svg{width:22px;height:22px}
nav .indicator{height:2px;border-radius:1px;width:20px;margin-top:2px;transition:background .2s}
nav button.active .indicator{background:var(--accent,var(--text))}

/* Cards */
.card{background:var(--card);border-radius:var(--radius);padding:16px;margin-bottom:12px}
.card-title{font-size:11px;color:var(--text2);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:12px}

/* Progress Bar */
.pbar-wrap{margin-bottom:14px}
.pbar-label{display:flex;justify-content:space-between;font-size:12px;margin-bottom:6px}
.pbar-label span:last-child{color:var(--text2)}
.pbar{height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.pbar-fill{height:100%;border-radius:3px;transition:width .5s ease}

/* Circular Progress — fixed positioning */
.circle-wrap{display:flex;flex-direction:column;align-items:center;margin:16px 0}
.circle-container{position:relative;width:180px;height:180px}
.circle-container svg{transform:rotate(-90deg);display:block}
.circle-inner{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.circle-text{font-size:28px;font-weight:700}
.circle-sub{font-size:12px;color:var(--text2);margin-top:4px}

/* Buttons */
.btn{padding:10px 18px;border-radius:10px;border:none;font-family:inherit;font-size:13px;
  font-weight:600;cursor:pointer;transition:transform .1s,opacity .1s}
.btn:active{transform:scale(0.96)}
.btn-accent{background:var(--accent,var(--blue));color:#fff}
.btn-ghost{background:var(--border);color:var(--text)}
.btn-sm{padding:8px 14px;font-size:12px;border-radius:8px}

/* Quick add row */
.quick-row{display:flex;gap:8px;justify-content:center;margin:16px 0}
.quick-row button{flex:1;max-width:120px}

/* Exercise list */
.ex-item{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)}
.ex-item:last-child{border-bottom:none}
.ex-check{width:24px;height:24px;border-radius:50%;border:2px solid var(--text3);
  display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;
  transition:all .2s}
.ex-check.done{border-color:var(--accent,var(--green));background:var(--accent,var(--green))}
.ex-check.done::after{content:'✓';font-size:13px;color:#fff}
.ex-name{font-size:13px;flex:1}
.ex-name.done{text-decoration:line-through;color:var(--text3)}
.ex-sets{font-size:12px;color:var(--text2);flex-shrink:0}

/* Day selector pills */
.day-pills{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;padding-bottom:4px}
.day-pills::-webkit-scrollbar{display:none}
.day-pill{padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:none;
  color:var(--text2);font-family:inherit;font-size:11px;cursor:pointer;white-space:nowrap;
  transition:all .2s}
.day-pill.active{background:var(--accent,var(--text));color:#000;border-color:transparent}

/* Split toggle */
.split-toggle{display:flex;gap:0;margin-bottom:14px;border-radius:10px;overflow:hidden;border:1px solid var(--border)}
.split-btn{flex:1;padding:8px;background:none;border:none;color:var(--text2);
  font-family:inherit;font-size:12px;cursor:pointer;transition:all .2s}
.split-btn.active{background:var(--accent,var(--text));color:#000}

/* Meal list */
.meal-item{display:flex;justify-content:space-between;align-items:center;padding:10px 0;
  border-bottom:1px solid var(--border)}
.meal-item:last-child{border-bottom:none}
.meal-name{font-size:13px}
.meal-macros{font-size:11px;color:var(--text2)}
.meal-del{background:none;border:none;color:var(--text3);cursor:pointer;font-size:16px;padding:4px 8px}
.meal-del:hover{color:var(--red)}

/* Form inputs */
.form-group{margin-bottom:12px}
.form-group label{display:block;font-size:11px;color:var(--text2);margin-bottom:6px;
  text-transform:uppercase;letter-spacing:1px}
.form-input{width:100%;padding:10px 12px;background:var(--card);border:1px solid var(--border);
  border-radius:10px;color:var(--text);font-family:inherit;font-size:14px;outline:none}
.form-input:focus{border-color:var(--text3)}
.form-row{display:flex;gap:10px}
.form-row .form-group{flex:1}

/* Settings overlay */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:100;display:flex;
  justify-content:center;overflow-y:auto}
.overlay-inner{width:100%;max-width:480px;padding:20px 16px}
.overlay-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.overlay-header h2{font-size:15px;letter-spacing:2px}
.overlay-close{background:none;border:none;color:var(--text2);font-size:24px;cursor:pointer}

/* Streak badge */
.streak{display:flex;align-items:center;gap:8px;padding:14px;justify-content:center}
.streak-num{font-size:36px;font-weight:700}
.streak-label{font-size:12px;color:var(--text2)}

/* Phase badge */
.phase-badge{font-size:11px;padding:4px 10px;border-radius:6px;font-weight:600;display:inline-block}

/* Summary row */
.summary-row{display:flex;gap:10px;margin-bottom:12px}
.summary-item{flex:1;background:var(--card);border-radius:var(--radius);padding:14px;text-align:center}
.summary-val{font-size:22px;font-weight:700}
.summary-label{font-size:10px;color:var(--text2);margin-top:4px;text-transform:uppercase;letter-spacing:1px}

/* Fasting timer */
.fast-ring{position:relative;width:140px;height:140px}
.fast-ring svg{transform:rotate(-90deg);display:block}
.fast-ring-inner{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.fast-time{font-size:22px;font-weight:700}
.fast-label{font-size:10px;color:var(--text2);margin-top:2px;text-transform:uppercase;letter-spacing:1px}
.fast-status{font-size:12px;font-weight:600;margin-top:2px}

/* Photo thumbnail */
.photo-thumb{width:60px;height:60px;border-radius:10px;object-fit:cover;border:2px solid var(--border)}
.photo-upload{display:none}
.photo-btn{display:flex;align-items:center;justify-content:center;width:60px;height:60px;
  border-radius:10px;border:2px dashed var(--text3);cursor:pointer;color:var(--text3);font-size:24px}
.photo-btn:hover{border-color:var(--text2);color:var(--text2)}

/* Animations */
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.card{animation:fadeIn .3s ease}

/* Hide all tabs by default */
.tab{display:none}
.tab.active{display:block}

/* Scanner overlay */
.scanner-overlay{position:fixed;inset:0;background:#000;z-index:200;display:flex;flex-direction:column;align-items:center}
.scanner-header{width:100%;max-width:480px;padding:16px;display:flex;justify-content:space-between;align-items:center;z-index:1}
.scanner-header span{font-size:13px;font-weight:600}
.scanner-video{width:100%;max-width:480px;flex:1;object-fit:cover;background:#000}
.scanner-guide{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:240px;height:140px;border:2px solid rgba(255,255,255,.4);border-radius:12px;pointer-events:none}
.scanner-guide::before{content:'';position:absolute;inset:-2px;border-radius:12px;
  border:2px solid var(--accent,var(--green));clip-path:polygon(0 0,30% 0,30% 2px,2px 2px,2px 30%,0 30%,0 0,70% 0,100% 0,100% 30%,calc(100% - 2px) 30%,calc(100% - 2px) 2px,70% 2px,70% 0,100% 100%,70% 100%,70% calc(100% - 2px),calc(100% - 2px) calc(100% - 2px),calc(100% - 2px) 70%,100% 70%,100% 100%,0 100%,0 70%,2px 70%,2px calc(100% - 2px),30% calc(100% - 2px),30% 100%,0 100%)}
.scanner-status{width:100%;max-width:480px;padding:16px;text-align:center;font-size:12px;color:var(--text2)}
.scanner-manual{width:100%;max-width:480px;padding:0 16px 20px;display:flex;gap:8px}
.scanner-manual input{flex:1}

/* Product result card */
.product-result{width:100%;max-width:480px;padding:16px;overflow-y:auto;flex:1}
.nutri-badge{display:inline-flex;align-items:center;justify-content:center;width:32px;height:32px;
  border-radius:50%;font-weight:700;font-size:14px;color:#fff;text-transform:uppercase}
.nutri-a{background:#038141}.nutri-b{background:#85BB2F}.nutri-c{background:#FECB02;color:#000}
.nutri-d{background:#EE8100}.nutri-e{background:#E63E11}
.ingredient-tag{display:inline-block;padding:4px 10px;border-radius:6px;font-size:11px;
  font-weight:600;margin:3px 4px 3px 0}
.tag-good{background:rgba(39,174,96,.15);color:var(--green)}
.tag-bad{background:rgba(231,76,60,.15);color:var(--red)}
.tag-warn{background:rgba(230,126,34,.15);color:var(--orange)}
.tag-neutral{background:var(--border);color:var(--text2)}
.nova-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:6px;font-size:11px;font-weight:600}
.nova-1{background:rgba(39,174,96,.15);color:var(--green)}
.nova-2{background:rgba(39,174,96,.1);color:var(--green)}
.nova-3{background:rgba(230,126,34,.15);color:var(--orange)}
.nova-4{background:rgba(231,76,60,.15);color:var(--red)}

/* Consistency heatmap */
.consist-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-top:10px}
.consist-dot{width:100%;aspect-ratio:1;border-radius:4px;background:var(--border)}
.consist-dot.hit{background:var(--accent,var(--green))}
.consist-dot.today{outline:2px solid var(--text2);outline-offset:1px}
.consist-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)}
.consist-row:last-child{border-bottom:none}
.consist-pct{font-size:20px;font-weight:700;min-width:52px;text-align:right}
.consist-info{flex:1}
.consist-label{font-size:12px;font-weight:600}
.consist-sub{font-size:10px;color:var(--text2);margin-top:2px}
.consist-bar{height:4px;background:var(--border);border-radius:2px;margin-top:6px;overflow:hidden}
.consist-bar-fill{height:100%;border-radius:2px;transition:width .5s ease}
</style>
</head>
<body>

</div>

// ── STORAGE ───────────────────────────────────────────
const today = () => new Date().toISOString().slice(0,10);

function loadSettings(){
  const d = {name:'',calorieTarget:2200,proteinTarget:180,waterTarget:4,currentWeek:1,split:3,fastStartHour:12,apiKey:''};
  try{
    const s = {...d,...JSON.parse(localStorage.getItem('ph_settings'))};
    // Migrate old oz water target to litres
    if(s.waterTarget > 20) s.waterTarget = 4;
    return s;
  }catch(e){return d}
}
function saveSettings(s){ localStorage.setItem('ph_settings',JSON.stringify(s)) }
function getPhase(week){ return week<=4?0:week<=8?1:2 }
function getPhaseColor(p){ return [getComputedStyle(document.documentElement).getPropertyValue('--red').trim(),
  getComputedStyle(document.documentElement).getPropertyValue('--orange').trim(),
  getComputedStyle(document.documentElement).getPropertyValue('--green').trim()][p]||'#fff' }
function getPhaseVar(p){ return ['var(--red)','var(--orange)','var(--green)'][p]||'var(--text)' }

function loadWorkout(date){ try{return JSON.parse(localStorage.getItem('ph_workout_'+date))||{}}catch(e){return{}} }
function saveWorkout(date,d){ localStorage.setItem('ph_workout_'+date,JSON.stringify(d)) }
function loadMeals(date){ try{return JSON.parse(localStorage.getItem('ph_meals_'+date))||[]}catch(e){return[]} }
function saveMeals(date,m){ localStorage.setItem('ph_meals_'+date,JSON.stringify(m)) }
function loadWater(date){ return parseFloat(localStorage.getItem('ph_water_'+date))||0 }
function saveWater(date,v){ localStorage.setItem('ph_water_'+date,v.toString()) }
function loadMorning(date){ try{return JSON.parse(localStorage.getItem('ph_morning_'+date))||{}}catch(e){return{}} }
function saveMorning(date,d){ localStorage.setItem('ph_morning_'+date,JSON.stringify(d)) }
function loadFasting(){ try{return JSON.parse(localStorage.getItem('ph_fasting'))||{}}catch(e){return{}} }
function saveFasting(d){ localStorage.setItem('ph_fasting',JSON.stringify(d)) }
function loadFastLog(){ try{return JSON.parse(localStorage.getItem('ph_fast_log'))||[]}catch(e){return[]} }
function saveFastLog(d){ localStorage.setItem('ph_fast_log',JSON.stringify(d)) }
function loadDaily(date){ try{return JSON.parse(localStorage.getItem('ph_daily_'+date))||{}}catch(e){return{}} }
function saveDaily(date,d){ localStorage.setItem('ph_daily_'+date,JSON.stringify(d)) }

function calcStreak(){
  let streak=0; const d=new Date();
  const t=today();
  const hasToday=loadMeals(t).length>0||loadWater(t)>0||Object.keys(loadWorkout(t)).length>0||Object.keys(loadMorning(t)).length>0;
  if(hasToday) streak=1;
  for(let i=1;i<365;i++){
    d.setDate(d.getDate()-1);
    const ds=d.toISOString().slice(0,10);
    const has=loadMeals(ds).length>0||loadWater(ds)>0||Object.keys(loadWorkout(ds)).length>0||Object.keys(loadMorning(ds)).length>0;
    if(has) streak++; else break;
  }
  return streak;
}

// ── CONSISTENCY TRACKER ──────────────────────────────
function calcConsistency(days){
  // Look back `days` days and check each category
  const dates=[];
  const d=new Date();
  for(let i=0;i<days;i++){
    dates.push(new Date(d).toISOString().slice(0,10));
    d.setDate(d.getDate()-1);
  }
  dates.reverse();

  const fastLog=loadFastLog();
  const s=settings;

  const results={
    workout:{hits:0,dates:[]},
    morning:{hits:0,dates:[]},
    discipline:{hits:0,dates:[]},
    fasting:{hits:0,dates:[]},
    water:{hits:0,dates:[]}
  };

  dates.forEach(dt=>{
    // Workout: at least 1 exercise done
    const wo=loadWorkout(dt);
    let woDone=false;
    Object.values(wo).forEach(day=>{Object.values(day).forEach(v=>{if(v)woDone=true})});
    if(woDone){results.workout.hits++;results.workout.dates.push(dt)}

    // Morning routine: all 4 exercises done
    const m=loadMorning(dt);
    const mDone=Object.values(m).filter(Boolean).length>=MORNING_ROUTINE.exercises.length;
    if(mDone){results.morning.hits++;results.morning.dates.push(dt)}

    // Daily discipline: reading done
    const daily=loadDaily(dt);
    if(daily.reading){results.discipline.hits++;results.discipline.dates.push(dt)}

    // Fasting: completed fast logged for this date
    if(fastLog.includes(dt)){results.fasting.hits++;results.fasting.dates.push(dt)}

    // Water: hit target
    const w=loadWater(dt);
    if(w>=s.waterTarget){results.water.hits++;results.water.dates.push(dt)}
  });

  return {dates,results,total:days};
}

// ── FASTING HELPERS ──────────────────────────────────
function getFastingState(){
  const f=loadFasting();
  if(!f.active) return {active:false,elapsed:0,duration:0,type:null,inEatingWindow:false};
  const start=new Date(f.startTime).getTime();
  const now=Date.now();
  const elapsed=(now-start)/1000/60/60; // hours
  const duration=f.duration||16;
  return {active:true,elapsed,duration,type:f.type||'16:8',
    remaining:Math.max(0,duration-elapsed),
    complete:elapsed>=duration,
    inEatingWindow:elapsed>=duration,
    startTime:f.startTime};
}

function startFast(type){
  const duration=type==='24'?24:16;
  saveFasting({active:true,startTime:new Date().toISOString(),duration,type});
  renderFood();
}

function endFast(){
  const fs=getFastingState();
  if(fs.active&&fs.complete){
    // Log completed fast
    const log=loadFastLog();
    const d=today();
    if(!log.includes(d)) log.push(d);
    saveFastLog(log);
  }
  saveFasting({active:false});
  renderFood();
}

function resetFast(){
  if(!confirm('Reset current fasting session?')) return;
  saveFasting({active:false});
  renderFood();
}

function toggleMorning(i){

function toggleReading(){

function handlePhoto(input){
  if(!input.files||!input.files[0]) return;
  const reader=new FileReader();
  reader.onload=function(e){
    // Compress the image
    const img=new Image();
    img.onload=function(){
      const canvas=document.createElement('canvas');
      const maxSize=400;
      let w=img.width, h=img.height;
      if(w>h){h=h*(maxSize/w);w=maxSize}else{w=w*(maxSize/h);h=maxSize}
      canvas.width=w; canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      const compressed=canvas.toDataURL('image/jpeg',0.7);
      const d=today(), daily=loadDaily(d);
      daily.photo=compressed;
      saveDaily(d,daily);
      renderHome();
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(input.files[0]);
}

function snapMeal(){

    return;
  }
  document.getElementById('meal-photo-input').click();

function handleMealPhoto(input){
  if(!input.files||!input.files[0]) return;
  const file=input.files[0];
  const reader=new FileReader();
  reader.onload=async function(e){
    // Compress before sending
    const img=new Image();
    img.onload=async function(){
      const canvas=document.createElement('canvas');
      const maxSize=800;
      let w=img.width, h=img.height;
      if(w>h){h=h*(maxSize/w);w=maxSize}else{w=w*(maxSize/h);h=maxSize}
      canvas.width=w; canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      const base64=canvas.toDataURL('image/jpeg',0.8).split(',')[1];
      await analyzeMealPhoto(base64);
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
  input.value='';
}

async function analyzeMealPhoto(base64){
  const el=document.getElementById('scanner-overlay');
  el.style.display='flex';
  el.innerHTML=`
    <div class="scanner-header">
      <button class="overlay-close" onclick="closeScanner()" style="font-size:20px">×</button>
      <span>Analyzing Meal...</span>
      <span></span>
    </div>
    <div style="flex:1;display:flex;align-items:center;justify-content:center;padding:20px">
      <div style="text-align:center">
        <img src="data:image/jpeg;base64,${base64}" style="width:200px;height:200px;object-fit:cover;border-radius:var(--radius);margin-bottom:16px"/>
        <div style="font-size:14px;margin-bottom:8px">Estimating nutrition...</div>
        <div style="font-size:11px;color:var(--text2)">Powered by Claude AI</div>
      </div>
    </div>
  `;

  try{
    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'x-api-key':settings.apiKey,
        'anthropic-version':'2023-06-01',
        'anthropic-dangerous-direct-browser-access':'true'
      },
      body:JSON.stringify({
        model:'claude-haiku-4-5-20251001',
        max_tokens:300,
        messages:[{
          role:'user',
          content:[
            {type:'image',source:{type:'base64',media_type:'image/jpeg',data:base64}},
            {type:'text',text:'Analyze this meal photo. Respond ONLY with valid JSON, no other text. Format: {"name":"meal name","calories":number,"protein":number,"items":[{"name":"item","calories":number,"protein":number}]}. Estimate calories and protein (grams) as accurately as possible based on typical portion sizes. If you cannot identify food, respond: {"error":"Could not identify food"}'}
          ]
        }]
      })
    });

    if(!resp.ok){
      const errData=await resp.json().catch(()=>({}));
      throw new Error(errData.error?.message||'API error: '+resp.status);
    }

    const data=await resp.json();
    const text=data.content[0].text.trim();
    // Extract JSON from response (handle markdown code blocks)
    const jsonMatch=text.match(/\{[\s\S]*\}/);
    if(!jsonMatch) throw new Error('Invalid response from AI');
    const result=JSON.parse(jsonMatch[0]);

    if(result.error){
      showScannerError('','Could not identify food in the photo. Try again with a clearer image.');
      return;
    }

    showMealPhotoResult(result,base64);

  }catch(e){
    const msg=e.message||'Failed to analyze photo.';
    const hint=msg.includes('credit')||msg.includes('balance')?
      '<div style="font-size:11px;color:var(--text3);margin-bottom:16px">Go to <strong>console.anthropic.com → Plans &amp; Billing</strong> to add credits, then try again.</div>':'';
    const el2=document.getElementById('scanner-overlay');
    el2.innerHTML=`
      <div class="scanner-header">
        <button class="overlay-close" onclick="closeScanner()" style="font-size:20px">×</button>
        <span>Error</span>
        <span></span>
      </div>
      <div style="flex:1;display:flex;align-items:center;justify-content:center;padding:20px">
        <div class="card" style="text-align:center;max-width:320px">
          <div style="font-size:28px;margin-bottom:12px">⚠️</div>
          <div style="font-size:13px;margin-bottom:16px">${escHtml(msg)}</div>
          ${hint}
          <div style="display:flex;gap:8px">
            <button class="btn btn-sm btn-ghost" style="flex:1" onclick="closeScanner();snapMeal()">Try Again</button>
            <button class="btn btn-sm btn-accent" style="flex:1" onclick="closeScanner()">Close</button>
          </div>
        </div>
      </div>
    `;
  }
}

let scannerMode='nutrition'; // 'nutrition' or 'ingredients'

function openScanner(mode){
  scannerMode=mode;
  const el=document.getElementById('scanner-overlay');
  el.style.display='flex';

  el.innerHTML=`
    <div class="scanner-header">
      <button class="overlay-close" onclick="closeScanner()" style="font-size:20px">×</button>
      <span>${mode==='nutrition'?'Scan for Calories':'Scan Ingredients'}</span>
      <span></span>
    </div>
    <div style="position:relative;width:100%;max-width:480px;flex:1;overflow:hidden" id="scanner-viewport"></div>
    <div class="scanner-status" id="scanner-status">Accessing camera...</div>
    <div class="scanner-manual">
      <input class="form-input" id="manual-barcode" placeholder="Enter barcode number" inputmode="numeric"/>
      <button class="btn btn-sm btn-accent" onclick="lookupManualBarcode()">Look Up</button>
    </div>
  `;

  startQuagga();
}

function startQuagga(){
  if(typeof Quagga==='undefined'){
    document.getElementById('scanner-status').textContent='Scanner loading failed. Use manual entry.';
    return;
  }
  Quagga.init({
    inputStream:{
      name:'Live',
      type:'LiveStream',
      target:document.getElementById('scanner-viewport'),
      constraints:{
        facingMode:'environment',
        width:{ideal:1280},
        height:{ideal:720}
      }
    },
    decoder:{
      readers:['ean_reader','ean_8_reader','upc_reader','upc_e_reader','code_128_reader']
    },
    locate:true,
    frequency:10
  }, function(err){
    if(err){
      document.getElementById('scanner-status').textContent='Camera access denied. Use manual entry below.';
      return;
    }
    Quagga.start();
    document.getElementById('scanner-status').textContent='Point at a barcode';

    // Style the video to fill the viewport
    const vp=document.getElementById('scanner-viewport');
    if(vp){
      const v=vp.querySelector('video');
      if(v){v.style.width='100%';v.style.height='100%';v.style.objectFit='cover'}
      const c=vp.querySelector('canvas');
      if(c){c.style.display='none'}
    }
  });

  Quagga.onDetected(function(result){
    if(result&&result.codeResult&&result.codeResult.code){
      const code=result.codeResult.code;
      Quagga.stop();
      document.getElementById('scanner-status').textContent='Found: '+code;
      lookupBarcode(code);
    }
  });
}

function closeScanner(){
  try{Quagga.stop()}catch(e){}
  document.getElementById('scanner-overlay').style.display='none';
}

function lookupManualBarcode(){
  const code=document.getElementById('manual-barcode').value.trim();
  if(!code) return;
  lookupBarcode(code);
}

async function lookupBarcode(code){
  const el=document.getElementById('scanner-overlay');
  try{Quagga.stop()}catch(e){}

  // Show loading
  el.innerHTML=`
    <div class="scanner-header">
      <button class="overlay-close" onclick="closeScanner()" style="font-size:20px">×</button>
      <span>Looking up product...</span>
      <span></span>
    </div>
    <div style="flex:1;display:flex;align-items:center;justify-content:center">
      <div style="text-align:center">
        <div style="font-size:14px;margin-bottom:8px">Searching OpenFoodFacts</div>
        <div style="font-size:12px;color:var(--text2)">${code}</div>
      </div>
    </div>
  `;

  try{
    const resp=await fetch('https://world.openfoodfacts.org/api/v2/product/'+encodeURIComponent(code)+'.json');
    const data=await resp.json();

    if(data.status!==1||!data.product){
      showScannerError(code,'Product not found in OpenFoodFacts database');
      return;
    }

    const product=data.product;
    if(scannerMode==='nutrition') showNutritionResult(product,code);
    else showIngredientResult(product,code);

  }catch(e){
    showScannerError(code,'Network error. Check your connection and try again.');
  }
}

        <div style="display:flex;gap:8px;margin-bottom:6px;font-size:11px;color:var(--text2)">
          <span>Fiber: ${fiber}g</span>
          <span>Sugar: ${sugar}g</span>
        </div>
      </div>

      <div style="display:flex;gap:8px;margin-top:4px">
        <button class="btn btn-accent" style="flex:1" onclick="addScannedMeal('${escAttr(name)}',${cal},${Math.round(pro)})">Add to Meals</button>
        <button class="btn btn-ghost" style="flex:1" onclick="closeScanner()">Cancel</button>
      </div>
    </div>
  `;
}

function showIngredientResult(product,code){
  const el=document.getElementById('scanner-overlay');
  const name=product.product_name||product.product_name_en||'Unknown Product';
  const brand=product.brands||'';
  const imgUrl=product.image_small_url||product.image_url||'';

  // Nutri-Score
  const nutriScore=(product.nutriscore_grade||product.nutrition_grades||'').toLowerCase();

  // NOVA group (1=unprocessed, 4=ultra-processed)
  const nova=product.nova_group||0;
  const novaLabels={1:'Unprocessed',2:'Processed culinary',3:'Processed',4:'Ultra-processed'};

  // Ingredients text
  const ingredientsText=product.ingredients_text||product.ingredients_text_en||'';

  // Additives
  const additives=(product.additives_tags||[]).map(a=>a.replace('en:','').replace(/-/g,' '));

  // Ingredient analysis tags
  const analysisTags=product.ingredients_analysis_tags||[];
  const palmOilFree=analysisTags.includes('en:palm-oil-free');
  const hasPalmOil=analysisTags.includes('en:palm-oil');
  const vegan=analysisTags.includes('en:vegan');
  const vegetarian=analysisTags.includes('en:vegetarian');

  // Nutrient levels
  const levels=product.nutrient_levels||{};

  // Build good/bad tags
  let tags=[];
  if(palmOilFree) tags.push({text:'No Palm Oil',type:'good'});
  if(hasPalmOil) tags.push({text:'Contains Palm Oil',type:'bad'});
  if(vegan) tags.push({text:'Vegan',type:'good'});
  else if(vegetarian) tags.push({text:'Vegetarian',type:'good'});
  if(levels.fat==='low') tags.push({text:'Low Fat',type:'good'});
  if(levels.fat==='high') tags.push({text:'High Fat',type:'bad'});
  if(levels['saturated-fat']==='low') tags.push({text:'Low Sat. Fat',type:'good'});
  if(levels['saturated-fat']==='high') tags.push({text:'High Sat. Fat',type:'bad'});
  if(levels.sugars==='low') tags.push({text:'Low Sugar',type:'good'});
  if(levels.sugars==='high') tags.push({text:'High Sugar',type:'bad'});
  if(levels.salt==='low') tags.push({text:'Low Salt',type:'good'});
  if(levels.salt==='high') tags.push({text:'High Salt',type:'bad'});
  if(levels.fat==='moderate') tags.push({text:'Moderate Fat',type:'warn'});
  if(levels.sugars==='moderate') tags.push({text:'Moderate Sugar',type:'warn'});
  if(levels.salt==='moderate') tags.push({text:'Moderate Salt',type:'warn'});

  const tagsHtml=tags.map(t=>`<span class="ingredient-tag tag-${t.type}">${t.text}</span>`).join('');

  const additivesHtml=additives.length
    ?additives.map(a=>`<span class="ingredient-tag tag-bad">${escHtml(a)}</span>`).join('')
    :'<span style="font-size:12px;color:var(--green)">No additives detected</span>';

  // Verdict
  let verdict='', verdictColor='var(--text2)';
  if(nutriScore==='a'||nutriScore==='b'){verdict='Good Choice';verdictColor='var(--green)'}
  else if(nutriScore==='c'){verdict='Moderate';verdictColor='var(--orange)'}
  else if(nutriScore==='d'||nutriScore==='e'){verdict='Poor Choice';verdictColor='var(--red)'}
  if(nova>=4){verdict='Ultra-Processed — Avoid';verdictColor='var(--red)'}

  el.innerHTML=`
    <div class="scanner-header">
      <button class="overlay-close" onclick="closeScanner()" style="font-size:20px">×</button>
      <span>Ingredient Analysis</span>
      <span></span>
    </div>
    <div class="product-result">
      <div class="card">
        <div style="display:flex;gap:12px;align-items:start;margin-bottom:14px">
          ${imgUrl?`<img src="${imgUrl}" style="width:56px;height:56px;border-radius:10px;object-fit:cover;background:var(--border)"/>`:''}
          <div style="flex:1">
            <div style="font-size:14px;font-weight:600">${escHtml(name)}</div>
            ${brand?`<div style="font-size:11px;color:var(--text2);margin-top:2px">${escHtml(brand)}</div>`:''}
          </div>
        </div>

        ${verdict?`<div style="text-align:center;padding:12px;background:var(--bg);border-radius:10px;margin-bottom:14px">
          <div style="font-size:16px;font-weight:700;color:${verdictColor}">${verdict}</div>
        </div>`:''}

        <div style="display:flex;gap:12px;margin-bottom:14px">
          ${nutriScore?`<div style="text-align:center">
            <div style="font-size:9px;color:var(--text2);margin-bottom:4px;text-transform:uppercase;letter-spacing:1px">Nutri-Score</div>
            <div class="nutri-badge nutri-${nutriScore}">${nutriScore}</div>
          </div>`:''}
          ${nova?`<div style="text-align:center">
            <div style="font-size:9px;color:var(--text2);margin-bottom:4px;text-transform:uppercase;letter-spacing:1px">NOVA Group</div>
            <div class="nova-badge nova-${nova}">${nova} — ${novaLabels[nova]||'Unknown'}</div>
          </div>`:''}
        </div>
      </div>

      ${tags.length?`<div class="card">
        <div class="card-title">Quality Indicators</div>
        <div>${tagsHtml}</div>
      </div>`:''}

      <div class="card">
        <div class="card-title">Additives (${additives.length})</div>
        <div>${additivesHtml}</div>
      </div>

      ${ingredientsText?`<div class="card">
        <div class="card-title">Ingredients</div>
        <div style="font-size:11px;color:var(--text2);line-height:1.6">${escHtml(ingredientsText)}</div>
      </div>`:''}

      <div style="text-align:center;margin-top:4px">
        <button class="btn btn-ghost" onclick="closeScanner()">Close</button>
      </div>
    </div>
  `;
}

function addScannedMeal(name,cal,pro){
  const meals=loadMeals(today());
  meals.push({id:Date.now(),name,calories:cal,protein:pro});
  saveMeals(today(),meals);
  closeScanner();
  renderFood();
}

function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function escAttr(s){return s.replace(/'/g,"\\'").replace(/\\/g,"\\\\")}

// ── SETTINGS ──────────────────────────────────────────
function toggleSettings(){
  const el=document.getElementById('settings-overlay');
  if(el.style.display==='none'){
    el.style.display='flex';
    el.innerHTML=`<div class="overlay-inner">
      <div class="overlay-header">
        <h2>SETTINGS</h2>
        <button class="overlay-close" onclick="toggleSettings()">×</button>
      </div>
      <div class="card">
        <div class="form-group">
          <label>Your Name</label>
          <input class="form-input" id="set-name" value="${settings.name}"/>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Calorie Target</label>
            <input class="form-input" id="set-cal" type="number" value="${settings.calorieTarget}"/>
          </div>
          <div class="form-group">
            <label>Protein Target (g)</label>
            <input class="form-input" id="set-pro" type="number" value="${settings.proteinTarget}"/>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Water Target (L)</label>
            <input class="form-input" id="set-water" type="number" step="0.5" value="${settings.waterTarget}"/>
          </div>
          <div class="form-group">
            <label>Current Week (1-12)</label>
            <input class="form-input" id="set-week" type="number" min="1" max="12" value="${settings.currentWeek}"/>
          </div>
        </div>
        <div class="form-group">
          <label>Program Split</label>
          <div class="split-toggle" style="margin-top:6px">
            <button class="split-btn ${settings.split===3?'active':''}" onclick="document.getElementById('set-split-5').classList.remove('active');this.classList.add('active')" id="set-split-3">3-Day</button>
            <button class="split-btn ${settings.split===5?'active':''}" onclick="document.getElementById('set-split-3').classList.remove('active');this.classList.add('active')" id="set-split-5">5-Day</button>
          </div>
        </div>
        <div class="form-group">
          <label>Anthropic API Key (for Snap Meal)</label>
          <input class="form-input" id="set-apikey" type="password" placeholder="sk-ant-..." value="${settings.apiKey||''}"/>
          <div style="font-size:10px;color:var(--text3);margin-top:4px">Stored locally. Used for AI meal photo analysis.</div>
        </div>
        <button class="btn btn-accent" style="width:100%;margin-top:8px" onclick="saveSettingsForm()">Save</button>
      </div>
    </div>`;
  } else {
    el.style.display='none';
  }
}

function saveSettingsForm(){
  settings.name=document.getElementById('set-name').value.trim();
  settings.calorieTarget=parseInt(document.getElementById('set-cal').value)||2200;
  settings.proteinTarget=parseInt(document.getElementById('set-pro').value)||180;
  settings.waterTarget=parseFloat(document.getElementById('set-water').value)||4;
  settings.currentWeek=Math.max(1,Math.min(12,parseInt(document.getElementById('set-week').value)||1));
  settings.split=document.getElementById('set-split-5').classList.contains('active')?5:3;
  settings.apiKey=document.getElementById('set-apikey').value.trim();
  saveSettings(settings);
  toggleSettings();
  selectedDay=0;
  render();
}

// ── INIT ──────────────────────────────────────────────
updateAccent();
render();
</script>
